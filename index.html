<!DOCTYPE html>
    <html lang="es">
    <head-scale=1.0"/><head>
        <title>TaskFlow</title>
        <meta charset="UTF-8"/>
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
        tailwind.config =
        {
        darkMode: 'class'
        }
        </script>
    </head>
    <body class="bg-gray-100 text-gray-800 dark:bg-gray-900 dark:text-gray-100">
        <header class="bg-blue-600 text-white p-4 text-center relative">
            <h1 class="text-2xl font-bold">TaskFlow</h1>
            <button id="dark-toggle" class="absolute right-4 top-4 bg-white text-blue-600 px-3 py-1 rounded"></button>
        </header>
        <main class="max-w-5xl mx-auto p-4 flex flex-col md:flex-row gap-4">
            <section class="bg-white dark:bg-gray-800 p-4 rounded shadow flex-1">
                <form id="task-form" class="flex gap-2 mb-4">
                    <input type="text" id="task-input" placeholder="Nueva tarea" required class="flex-1 border rounded px-3 py-2 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 focus:outline-none focus:ring focus:ring-blue-300"/>
                    <button class="bg-blue-600 text-white px-4 rounded hover:bg-blue-700">Añadir</button>
                </form>
                <div class="flex gap-2 mb-4">
                    <button data-filter="all" class="border px-3 py-1 rounded">Todas</button>
                    <button data-filter="pending" class="border px-3 py-1 rounded">Pendientes</button>
                    <button data-filter="completed" class="border px-3 py-1 rounded">Completadas</button>
                </div>
                <ul id="task-list" class="space-y-2"></ul>
            </section>
            <aside class="bg-white dark:bg-gray-800 p-4 rounded shadow w-full md:w-64">
                <h2 class="font-bold mb-2">Estadísticas</h2>
                <p>Total: <span id="total-tasks">0</span></p>
                <p>Completadas: <span id="completed-tasks">0</span></p>
                <p>Pendientes: <span id="pending-tasks">0</span></p>
            </aside>
        </main>
        <script src="app.js"></script>
    </body>
</html>
